<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
</head>
<body>
    <div class="dashboard-container">
        <!-- Header & Search -->
        <header class="header">
            <div class="logo">
                <i class="fa-solid fa-chart-line"></i>
                <h1>My Portfolio</h1>
            </div>
            <div class="search-section">
                <input type="text" id="ticker-input" placeholder="Enter Ticker (e.g. AAPL)" autocomplete="off">
                <button id="search-btn"><i class="fa-solid fa-magnifying-glass"></i> Search</button>
            </div>
        </header>

        <!-- Search Result (Hidden by default) -->
        <div id="search-result-card" class="search-result-card hidden">
            <div class="search-result-header">
                <h3 id="search-ticker-name">TICKER</h3>
                <button id="add-to-portfolio-btn" class="icon-btn" title="Add to Portfolio"><i class="fa-solid fa-plus"></i></button>
                <button id="close-search-btn" class="icon-btn"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="search-data">
                <div class="data-item">
                    <span class="label">Equity</span>
                    <span class="value" id="search-equity">$0.00</span>
                </div>
                <div class="data-item">
                    <span class="label">Change</span>
                    <span class="value" id="search-change">0.00</span>
                </div>
                <div class="data-item">
                    <span class="label">Div. Yield</span>
                    <span class="value" id="search-yield">0.00%</span>
                </div>
            </div>
        </div>

        <!-- Portfolio Table -->
        <main class="portfolio-section">
            <div class="card table-card">
                <h2>Holdings</h2>
                <div class="table-responsive">
                    <table id="portfolio-table">
                        <thead>
                            <tr>
                                <th>Ticker</th>
                                <th>Shares</th>
                                <th>Price</th>
                                <th>Equity</th>
                                <th>Net Yield</th>
                                <th>Last Div</th>
                                <th>Total Div</th>
                            </tr>
                        </thead>
                        <tbody id="portfolio-body">
                            <!-- Rows will be injected here by JS -->
                        </tbody>
                    </table>
                </div>
                <!-- Loading Spinner -->
                <div id="loadingIndicator" class="loading-overlay hidden">
                    <div class="spinner"></div>
                    <p>Fetching real-time data...</p>
                </div>
            </div>
        </main>

        <!-- Recent Searches -->
        <section class="recent-searches-section">
            <div class="card recent-card">
                <h2>Recent Searches</h2>
                <ul id="recent-search-list" class="recent-list">
                    <!-- Items will be injected here -->
                </ul>
            </div>
        </section>
    </div>

    <!-- Scripts -->
    <script src="/static/app.js"></script>
</body>
</html>
